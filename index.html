<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#008ED3" />
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <title>ZTE Southern Africa Engineering Service Office</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
      // 核心垫片：防止在非 Node 环境下因缺少 process 对象而崩溃
      window.process = { 
        env: { 
          API_KEY: '' 
        } 
      };

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              zte: {
                blue: '#008ED3', 
                light: '#E0F2FA', 
                dark: '#0071A9'  
              }
            }
          }
        }
      }
      
      window.onerror = function(msg, url, line) {
        console.error("Global Error: " + msg + " at " + url + ":" + line);
        return false;
      };
    </script>
    
    <style>
      * { box-sizing: border-box; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .h-screen-safe { height: 100vh; height: 100dvh; }

      html, body {
        margin: 0; padding: 0;
        background-color: #f0f9ff;
        overflow: hidden;
      }

      #app-shell {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: linear-gradient(to bottom right, #E0F2FA, #F0F9FF, #ffffff);
        transition: opacity 0.5s ease-out, visibility 0.5s;
      }

      body.app-ready #app-shell {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #root { width: 100%; height: 100%; }

      @media (max-width: 1024px) {
        html { background-color: #E0F2FA !important; }
        body { background: linear-gradient(to bottom right, #E0F2FA, #F0F9FF, #ffffff) !important; }
      }
    </style>

    <!-- ES Module Shims: 关键组件，确保在静态环境下正确解析 import maps -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.8.2/dist/es-module-shims.js"></script>

    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.2.0,react-dom@18.2.0",
    "lucide-react": "https://esm.sh/lucide-react@0.363.0?deps=react@18.2.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3",
    "@google/genai": "https://esm.sh/@google/genai@1.33.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
  </head>
  <body>
    <div id="app-shell">
      <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/ZTE-logo.svg" alt="ZTE" style="width: 120px; height: auto;" />
      <div style="margin-top: 20px; font-size: 12px; color: #008ED3; opacity: 0.6; letter-spacing: 2px;">LOADING...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
